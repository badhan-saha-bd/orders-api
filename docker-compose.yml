services:
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      APP_ENV: production
      SECRET_KEY: ${SECRET_KEY:-local-dev-secret-change-me}
  db:
    image: postgres:16-alpine
    profiles:
      - db
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: orders
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-postgres-password}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orders -d orders"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:
